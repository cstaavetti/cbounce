<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cbounce FPS Collapse Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101113;
        color: #f4f1e8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #101113;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        top: 14px;
        left: 14px;
        right: 14px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
      }

      .stats {
        min-width: min(420px, calc(100vw - 110px));
        padding: 8px 10px;
        border: 1px solid rgba(244, 241, 232, 0.16);
        background: rgba(16, 17, 19, 0.72);
        font-size: 13px;
        line-height: 1.35;
        color: rgba(244, 241, 232, 0.92);
        backdrop-filter: blur(8px);
      }

      .controls {
        width: min(260px, calc(100vw - 28px));
        padding: 8px 10px;
        border: 1px solid rgba(244, 241, 232, 0.16);
        background: rgba(16, 17, 19, 0.72);
        color: rgba(244, 241, 232, 0.9);
        font-size: 12px;
        line-height: 1.45;
        backdrop-filter: blur(8px);
        pointer-events: auto;
      }

      .controls-title {
        margin-bottom: 5px;
        color: #f4f1e8;
        font-size: 13px;
        font-weight: 700;
      }

      .controls-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2px 10px;
      }

      .key {
        color: #fff0b8;
        font-weight: 700;
        white-space: nowrap;
      }

      button {
        min-width: 70px;
        min-height: 36px;
        border: 1px solid rgba(244, 241, 232, 0.2);
        border-radius: 6px;
        background: rgba(44, 57, 64, 0.86);
        color: #f4f1e8;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      button:hover,
      button:focus-visible {
        background: rgba(69, 88, 96, 0.95);
        outline: none;
      }

      .reticle {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .reticle::before,
      .reticle::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        background: rgba(255, 249, 226, 0.92);
        box-shadow: 0 0 8px rgba(255, 249, 226, 0.35);
        transform: translate(-50%, -50%);
      }

      .reticle::before {
        width: 18px;
        height: 2px;
      }

      .reticle::after {
        width: 2px;
        height: 18px;
      }

      .gate {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 42%, rgba(75, 88, 86, 0.2), rgba(16, 17, 19, 0.74) 58%);
        pointer-events: auto;
      }

      .gate button {
        min-width: 118px;
        min-height: 44px;
        border-color: rgba(244, 241, 232, 0.28);
        background: rgba(114, 78, 49, 0.92);
        font-size: 16px;
      }

      body.playing .gate {
        display: none;
      }

      @media (max-width: 640px) {
        .hud {
          top: 10px;
          left: 10px;
          right: 10px;
        }

        .stats {
          min-width: 0;
          flex: 1;
          font-size: 12px;
        }

        .controls {
          width: 190px;
          font-size: 11px;
        }

        button {
          min-width: 64px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>
    <div class="hud">
      <div id="stats" class="stats">Loading</div>
      <div class="controls" aria-label="Controls">
        <div class="controls-title">Controls</div>
        <div class="controls-grid">
          <span class="key">WASD</span><span>Move</span>
          <span class="key">Mouse</span><span>Look</span>
          <span class="key">Click</span><span>Shoot balls</span>
          <span class="key">Walk</span><span>Push objects</span>
          <span class="key">R</span><span>Reset</span>
        </div>
      </div>
    </div>
    <div class="reticle" aria-hidden="true"></div>
    <div id="gate" class="gate">
      <button id="play" type="button">Play</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
